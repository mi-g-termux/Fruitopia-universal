[build]
  command  = "npm run build"
  publish  = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/firebase-config.json"
  to   = "/.netlify/functions/api/firebase-config.json"
  status = 200

[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
[[redirects]]
  from = "/api/sslcommerz/create-payment"
  to = "/.netlify/functions/create-payment"
  status = 200